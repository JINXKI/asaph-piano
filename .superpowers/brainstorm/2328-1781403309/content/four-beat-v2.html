<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포비트 연습 Mockup v2</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
:root{--cream:#FFFFFF;--ink:#3a342c;--bg:#F5EDD6;
  --left-col:#3C90DD;--right-col:#EF8A3C;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font-family:'Gaegu',sans-serif;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;padding:32px;gap:24px;}

.page{width:794px;background:var(--cream);padding:44px 42px;
  border-radius:4px;box-shadow:0 6px 28px rgba(0,0,0,.16);}

h1{font-family:'Jua',sans-serif;font-size:38px;text-align:center;margin-bottom:24px;}

/* ---- section card ---- */
.fobeat-section{
  background:#FFFDF6;
  border:3px solid #EAD9B6;
  border-radius:22px;
  padding:20px 24px 24px;
}
.fobeat-title{
  font-family:'Jua',sans-serif;font-size:24px;
  text-align:center;margin-bottom:20px;
}

/* ---- two-track row ---- */
.track-pair{
  display:flex;
  gap:24px;
  align-items:flex-start;
  justify-content:center;
}
.hand-track{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

/* hand label above track */
.hand-label{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.hand-label .title{
  font-family:'Jua',sans-serif;
  font-size:18px;
}
.hand-label .title.left{color:var(--left-col);}
.hand-label .title.right{color:var(--right-col);}

/* SVG hand */
.hand-svg{ display:block; }

/* beat numbers row */
.beat-nums{
  display:flex;
  width:100%;
}
.beat-num{
  flex:1;text-align:center;
  font-family:'Jua',sans-serif;font-size:14px;
  color:#9a8f7d;
}

/* track bar */
.track{
  width:100%;
  height:90px;
  border:3px solid var(--ink);
  border-radius:14px;
  overflow:hidden;
  display:flex;
  background:#fff;
}
.cell{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:2px solid #E3D8C0;
  position:relative;
}
.cell:last-child{border-right:none;}
.cell.active-left{ background:#EAF4FF; }
.cell.active-right{ background:#FFF3E8; }

/* divider */
.track-divider{
  width:3px;
  background:#EAD9B6;
  border-radius:4px;
  align-self:stretch;
  margin:0 4px;
}

/* beat number labels under track */
.beat-labels{
  display:flex; width:100%;
}
.beat-lbl{
  flex:1;text-align:center;
  font-family:'Jua',sans-serif;font-size:13px;color:#b0a088;
}
</style>
</head>
<body>

<div class="page">
  <h1>🥁 포비트 연습</h1>

  <div class="fobeat-section">
    <div class="fobeat-title">손 따라 박수치기</div>

    <div class="track-pair">

      <!-- ===== LEFT HAND (왼손) ===== -->
      <div class="hand-track">
        <div class="hand-label">
          <!-- Left hand SVG -->
          <svg class="hand-svg" width="64" height="72" viewBox="0 0 64 72">
            <!-- palm -->
            <ellipse cx="32" cy="52" rx="22" ry="18" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <!-- thumb (left side) -->
            <ellipse cx="10" cy="46" rx="6" ry="10" fill="#FBEAC2" stroke="#c9a060" stroke-width="2" transform="rotate(20 10 46)"/>
            <!-- index -->
            <rect x="14" y="18" width="9" height="26" rx="5" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <!-- middle -->
            <rect x="24" y="12" width="9" height="30" rx="5" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <!-- ring -->
            <rect x="34" y="15" width="9" height="28" rx="5" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <!-- pinky -->
            <rect x="44" y="22" width="8" height="22" rx="4" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <!-- L label -->
            <text x="32" y="57" font-family="Jua,sans-serif" font-size="15" fill="#3C90DD" text-anchor="middle" font-weight="bold">L</text>
          </svg>
          <span class="title left">왼손</span>
        </div>

        <div class="beat-nums">
          <div class="beat-num">1</div>
          <div class="beat-num">2</div>
          <div class="beat-num">3</div>
          <div class="beat-num">4</div>
        </div>

        <!-- Left pattern: 왼 ○ ○ 왼  → beats 1,4 active -->
        <div class="track">
          <div class="cell active-left">
            <!-- quarter note SVG -->
            <svg width="32" height="46" viewBox="0 0 40 58">
              <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#3C90DD"/>
              <line x1="24" y1="38" x2="24" y2="6" stroke="#3C90DD" stroke-width="2.8"/>
            </svg>
          </div>
          <div class="cell">
            <!-- empty — rest dot -->
            <svg width="28" height="40" viewBox="0 0 36 58">
              <circle cx="18" cy="30" r="5" fill="none" stroke="#C8C0B4" stroke-width="2"/>
            </svg>
          </div>
          <div class="cell">
            <svg width="28" height="40" viewBox="0 0 36 58">
              <circle cx="18" cy="30" r="5" fill="none" stroke="#C8C0B4" stroke-width="2"/>
            </svg>
          </div>
          <div class="cell active-left">
            <svg width="32" height="46" viewBox="0 0 40 58">
              <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#3C90DD"/>
              <line x1="24" y1="38" x2="24" y2="6" stroke="#3C90DD" stroke-width="2.8"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- divider -->
      <div class="track-divider"></div>

      <!-- ===== RIGHT HAND (오른손) ===== -->
      <div class="hand-track">
        <div class="hand-label">
          <!-- Right hand SVG (mirrored) -->
          <svg class="hand-svg" width="64" height="72" viewBox="0 0 64 72" style="transform:scaleX(-1)">
            <ellipse cx="32" cy="52" rx="22" ry="18" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <ellipse cx="10" cy="46" rx="6" ry="10" fill="#FBEAC2" stroke="#c9a060" stroke-width="2" transform="rotate(20 10 46)"/>
            <rect x="14" y="18" width="9" height="26" rx="5" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <rect x="24" y="12" width="9" height="30" rx="5" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <rect x="34" y="15" width="9" height="28" rx="5" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <rect x="44" y="22" width="8" height="22" rx="4" fill="#FBEAC2" stroke="#c9a060" stroke-width="2"/>
            <!-- R label (flip back for text) -->
          </svg>
          <!-- separate R text since SVG is mirrored -->
          <svg width="64" height="20" viewBox="0 0 64 20" style="margin-top:-18px;position:relative;z-index:1;">
            <text x="32" y="16" font-family="Jua,sans-serif" font-size="15" fill="#EF8A3C" text-anchor="middle" font-weight="bold">R</text>
          </svg>
          <span class="title right">오른손</span>
        </div>

        <div class="beat-nums">
          <div class="beat-num">1</div>
          <div class="beat-num">2</div>
          <div class="beat-num">3</div>
          <div class="beat-num">4</div>
        </div>

        <!-- Right pattern: 오 ○ 오 ○  → beats 1,3 active -->
        <div class="track">
          <div class="cell active-right">
            <svg width="32" height="46" viewBox="0 0 40 58">
              <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#EF8A3C"/>
              <line x1="24" y1="38" x2="24" y2="6" stroke="#EF8A3C" stroke-width="2.8"/>
            </svg>
          </div>
          <div class="cell">
            <svg width="28" height="40" viewBox="0 0 36 58">
              <circle cx="18" cy="30" r="5" fill="none" stroke="#C8C0B4" stroke-width="2"/>
            </svg>
          </div>
          <div class="cell active-right">
            <svg width="32" height="46" viewBox="0 0 40 58">
              <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#EF8A3C"/>
              <line x1="24" y1="38" x2="24" y2="6" stroke="#EF8A3C" stroke-width="2.8"/>
            </svg>
          </div>
          <div class="cell">
            <svg width="28" height="40" viewBox="0 0 36 58">
              <circle cx="18" cy="30" r="5" fill="none" stroke="#C8C0B4" stroke-width="2"/>
            </svg>
          </div>
        </div>
      </div>

    </div><!-- end track-pair -->

  </div><!-- end fobeat-section -->
</div>

</body>
</html>
