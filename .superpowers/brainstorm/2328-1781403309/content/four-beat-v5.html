<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포비트 연습 Mockup v5</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
:root{--cream:#FFFFFF;--ink:#3a342c;--bg:#F5EDD6;
  --left:#3C90DD;--right:#EF8A3C;--both:#9B59B6;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font-family:'Gaegu',sans-serif;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;padding:32px;}
.page{width:794px;background:var(--cream);padding:44px 42px;
  border-radius:4px;box-shadow:0 6px 28px rgba(0,0,0,.16);}
h1{font-family:'Jua',sans-serif;font-size:38px;text-align:center;margin-bottom:28px;}

.fobeat-section{
  background:#FFFDF6;border:3px solid #EAD9B6;
  border-radius:22px;padding:22px 32px 28px;
}
.fobeat-title{font-family:'Jua',sans-serif;font-size:24px;text-align:center;margin-bottom:28px;}

/* 4-beat grid: one column per beat */
.beat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.beat-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* ── hand icon area (top) ── */
.hand-zone{
  height:88px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:4px;
  padding-bottom:6px;
}

/* ── track cell ── */
.beat-cell{
  width:100%;
  height:100px;
  border:3px solid var(--ink);
  border-radius:16px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.beat-cell.both-active {
  background:linear-gradient(135deg,#EAF4FF 50%,#FFF3E8 50%);
}
.beat-cell.left-active{ background:#EAF4FF; }
.beat-cell.right-active{ background:#FFF3E8; }

/* ── beat number label (bottom) ── */
.beat-num{
  margin-top:8px;
  font-family:'Jua',sans-serif;font-size:18px;color:#9a8f7d;
}

/* ── what-to-do label ── */
.action-label{
  margin-top:5px;
  font-family:'Jua',sans-serif;font-size:16px;
  text-align:center;line-height:1.2;
}
</style>
</head>
<body>
<div class="page">
  <h1>🥁 포비트 연습</h1>

  <div class="fobeat-section">
    <div class="fobeat-title">손 따라 박수치기</div>

    <div class="beat-grid">

      <!-- ═══ BEAT 1: 양손 ═══ -->
      <div class="beat-col">
        <div class="hand-zone">
          <!-- Left hand -->
          <svg width="46" height="54" viewBox="0 0 70 80">
            <ellipse cx="35" cy="60" rx="26" ry="18" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="8"  y="28" width="10" height="24" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="20" y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="32" y="14" width="10" height="36" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="44" y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="55" y="46" width="10" height="20" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2" transform="rotate(30 60 56)"/>
            <circle cx="35" cy="61" r="11" fill="#3C90DD" opacity="0.2"/>
            <text x="35" y="66" font-family="Jua,sans-serif" font-size="15" fill="#3C90DD" text-anchor="middle" font-weight="bold">L</text>
          </svg>
          <!-- Right hand -->
          <svg width="46" height="54" viewBox="0 0 70 80">
            <ellipse cx="35" cy="60" rx="26" ry="18" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="8"  y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="20" y="14" width="10" height="36" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="32" y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="44" y="28" width="10" height="24" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="4"  y="46" width="10" height="20" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2" transform="rotate(-30 9 56)"/>
            <circle cx="35" cy="61" r="11" fill="#EF8A3C" opacity="0.2"/>
            <text x="35" y="66" font-family="Jua,sans-serif" font-size="15" fill="#EF8A3C" text-anchor="middle" font-weight="bold">R</text>
          </svg>
        </div>
        <div class="beat-cell both-active">
          <!-- quarter note: split L+R color -->
          <svg width="38" height="56" viewBox="0 0 40 58">
            <!-- note head left half blue, right half orange -->
            <defs>
              <clipPath id="cl1"><rect x="0" y="0" width="20" height="58"/></clipPath>
              <clipPath id="cr1"><rect x="20" y="0" width="20" height="58"/></clipPath>
            </defs>
            <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#3C90DD" clip-path="url(#cl1)"/>
            <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#EF8A3C" clip-path="url(#cr1)"/>
            <line x1="24" y1="38" x2="24" y2="6" stroke="#3a342c" stroke-width="2.8"/>
          </svg>
        </div>
        <div class="beat-num">1박</div>
        <div class="action-label" style="color:var(--both)">양손</div>
      </div>

      <!-- ═══ BEAT 2: 쉼표 ═══ -->
      <div class="beat-col">
        <div class="hand-zone">
          <!-- no hands -->
        </div>
        <div class="beat-cell">
          <!-- quarter rest -->
          <svg width="34" height="56" viewBox="0 0 40 58">
            <path d="M14 12 L25 23 L15 29 L25 40 Q11 36 19 48"
              fill="none" stroke="#B8B0A4" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="beat-num">2박</div>
        <div class="action-label" style="color:#B8B0A4">쉬기</div>
      </div>

      <!-- ═══ BEAT 3: 오른손 ═══ -->
      <div class="beat-col">
        <div class="hand-zone">
          <!-- Right hand only -->
          <svg width="56" height="66" viewBox="0 0 70 80">
            <ellipse cx="35" cy="60" rx="26" ry="18" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="8"  y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="20" y="14" width="10" height="36" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="32" y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="44" y="28" width="10" height="24" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="4"  y="46" width="10" height="20" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2" transform="rotate(-30 9 56)"/>
            <circle cx="35" cy="61" r="11" fill="#EF8A3C" opacity="0.2"/>
            <text x="35" y="66" font-family="Jua,sans-serif" font-size="15" fill="#EF8A3C" text-anchor="middle" font-weight="bold">R</text>
          </svg>
        </div>
        <div class="beat-cell right-active">
          <svg width="38" height="56" viewBox="0 0 40 58">
            <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#EF8A3C"/>
            <line x1="24" y1="38" x2="24" y2="6" stroke="#EF8A3C" stroke-width="2.8"/>
          </svg>
        </div>
        <div class="beat-num">3박</div>
        <div class="action-label" style="color:var(--right)">오른손</div>
      </div>

      <!-- ═══ BEAT 4: 왼손 ═══ -->
      <div class="beat-col">
        <div class="hand-zone">
          <!-- Left hand only -->
          <svg width="56" height="66" viewBox="0 0 70 80">
            <ellipse cx="35" cy="60" rx="26" ry="18" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="8"  y="28" width="10" height="24" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="20" y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="32" y="14" width="10" height="36" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="44" y="20" width="10" height="30" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2"/>
            <rect x="55" y="46" width="10" height="20" rx="5" fill="#FBEAC2" stroke="#C9A060" stroke-width="2.2" transform="rotate(30 60 56)"/>
            <circle cx="35" cy="61" r="11" fill="#3C90DD" opacity="0.2"/>
            <text x="35" y="66" font-family="Jua,sans-serif" font-size="15" fill="#3C90DD" text-anchor="middle" font-weight="bold">L</text>
          </svg>
        </div>
        <div class="beat-cell left-active">
          <svg width="38" height="56" viewBox="0 0 40 58">
            <ellipse cx="18" cy="40" rx="7" ry="5" transform="rotate(-20 18 40)" fill="#3C90DD"/>
            <line x1="24" y1="38" x2="24" y2="6" stroke="#3C90DD" stroke-width="2.8"/>
          </svg>
        </div>
        <div class="beat-num">4박</div>
        <div class="action-label" style="color:var(--left)">왼손</div>
      </div>

    </div><!-- beat-grid -->
  </div><!-- fobeat-section -->
</div>
</body>
</html>
